<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Escola</title>
    <link rel="stylesheet" href="../css/cadastro.css">
</head>
<body>
    <header class="top-bar">
        <div class="logo-section">
            <div class="icon-circle">
                <img src="sua-logo.png" alt="Logo">
            </div>
            <span>Escola</span>
            <a href="../index.html" class="página inicial">Voltar</a>
        </div>
    </header>

    <main class="content">
        <div class="login-card">
            <h1>Cadastro</h1>
            <hr class="divider">
            
            <form>
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="Seu nome completo">
                </div>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" name="email" placeholder="seu@email.com">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="******">
                </div>

                <button type="submit" class="btn-acessar">Cadastrar</button>
                
                <div class="footer-link">
                    <a href="../html/login.html" >Já tem uma conta? Entre aqui</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
