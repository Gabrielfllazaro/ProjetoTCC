<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="../css/login.css">
<body>
    <div class="background-overlay">
        </div>      

    <div class="main-container">
        <header class="header">
            <div class="logo-container">
                <img src="https://via.placeholder.com/40" alt="Logo Escola" class="logo">
                <span class="school-name">Escola</span>     
            </div>
            <a href="../index.html" class="página inicial">Voltar</a>
        </header>

        <main class="login-container">
            <div class="login-box">
                <h1 class="login-title">Login</h1>
                
                <form class="login-form">
                    <div class="input-group">
                        <label for="email" class="input-label">E-mail</label>
                        <input type="email" id="email" name="email" class="input-field" required placeholder="seu@gmail.com">
                    </div>
                    
                    <div class="input-group">
                        <label for="senha" class="input-label">Senha</label>
                        <input type="password" id="senha" name="senha" class="input-field" required placeholder="******">
                    </div>
                    
                    <button type="submit" class="submit-button">Acessar</button>

                    <div class="footer-link">
                    <a href="../html/cadastro.html" >Não tem uma conta? Entre aqui</a>
                </div>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
